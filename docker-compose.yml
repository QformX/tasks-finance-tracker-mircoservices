version: '3.8'

services:
  # --- Databases ---
  postgres-users:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users_db
    volumes:
      - users_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-core:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core_db
    volumes:
      - core_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d core_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  analytics-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Broker & Cache ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672" # Management UI
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Services ---
  users-service:
    build:
      context: ./services/users
    command: >
      sh -c "cd /app/services/users && 
             echo 'Running Alembic migrations...' && 
             alembic upgrade head && 
             echo 'Starting application...' && 
             cd /app && 
             uvicorn services.users.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres-users:5432/users_db
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672/
      JWT_SECRET: "supersecretkey" # Change in production
      JWT_ALGORITHM: "HS256"
    depends_on:
      postgres-users:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  core-service:
    build:
      context: ./services/core
    command: >
      sh -c "cd /app/services/core && 
             echo 'Running Alembic migrations...' && 
             alembic upgrade head && 
             echo 'Starting application...' && 
             cd /app && 
             uvicorn services.core.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres-core:5432/core_db
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: "supersecretkey"
      JWT_ALGORITHM: "HS256"
    depends_on:
      postgres-core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: ./services/analytics
    command: >
      sh -c "cd /app/services/analytics && 
             echo 'Running Alembic migrations...' && 
             alembic upgrade head && 
             echo 'Starting worker and application...' && 
             cd /app && 
             python -m services.analytics.worker & 
             exec uvicorn services.analytics.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@analytics-db:5432/analytics_db
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672/
    depends_on:
      analytics-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- Gateway ---
  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - users-service
      - core-service
      - analytics-service

volumes:
  users_pg_data:
  core_pg_data:
  analytics_pg_data:

