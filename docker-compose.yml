services:
  # --- Databases ---
  postgres-users:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: users_db
    volumes:
      - users_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-core:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: core_db
    volumes:
      - core_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d core_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  analytics-db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: analytics_db
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Broker & Cache ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file:
      - .env
    ports:
      - "15672:15672" # Management UI
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq-ai:
    image: rabbitmq:3-management-alpine
    env_file:
      - .env
    ports:
      - "15673:15672" # Management UI
      - "5673:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Services ---
  users-service:
    build:
      context: ./services/users
    env_file:
      - .env
    environment:
      DATABASE_URL: ${USERS_DATABASE_URL}
    depends_on:
      postgres-users:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
  
  core-service:
    build:
      context: ./services/core
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CORE_DATABASE_URL}
    depends_on:
      postgres-core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics
    env_file:
      - .env
    environment:
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}
    depends_on:
      analytics-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai_service
    env_file:
      - .env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      RABBITMQ_URL: amqp://user:password@rabbitmq-ai:5672/
      DATABASE_URL: ${CORE_DATABASE_URL}
    ports:
      - "8003:8000"
    depends_on:
      rabbitmq-ai:
        condition: service_healthy
      postgres-core:
        condition: service_healthy
    restart: unless-stopped

  # --- Workers ---
  core-worker:
    build:
      context: ./services/core
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CORE_DATABASE_URL}
    command: ["python", "-m", "app.workers.events_consumer"]
    depends_on:
      postgres-core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  core-rpc-worker:
    build:
      context: ./services/core
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CORE_DATABASE_URL}
      AI_RABBITMQ_URL: amqp://user:password@rabbitmq-ai:5672/
    command: ["faststream", "run", "app.rpc_worker:app"]
    depends_on:
      postgres-core:
        condition: service_healthy
      rabbitmq-ai:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  analytics-worker:
    build:
      context: ./services/analytics
    env_file:
      - .env
    environment:
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}
    command: ["python", "-m", "app.workers.events_consumer"]
    depends_on:
      analytics-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Gateway ---
  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - users-service
      - core-service
      - analytics-service
      - ai-service

volumes:
  users_pg_data:
  core_pg_data:
  analytics_pg_data:

