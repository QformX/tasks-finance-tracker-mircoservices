<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/high-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognito</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.color = 'red';
        div.style.padding = '20px';
        div.style.background = 'white';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.zIndex = '9999';
        div.innerText = 'Error: ' + message + '\nSource: ' + source + ':' + lineno;
        document.body.appendChild(div);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
